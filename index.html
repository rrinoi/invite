<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>20</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* экраны */
.screen {
  position: fixed;
  width: 100%;
  height: 100vh;
  top: 0;
  left: 0;
}

/* первый экран */
#loading {
  background: #ff4fa3;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 2;
}

/* второй экран */
#main {
  background: #ff4fa3;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1;
}

/* скрытие */
.hidden {
  display: none !important;
}

/* картинка */
#main img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* loading */
#loading img {
  width: 260px;
  margin-bottom: 20px;
}

.loading-text {
  font-size: 40px;
  color: white;
  text-shadow: 3px 3px 0 black;
  margin-bottom: 20px;
}

.button {
  padding: 12px 28px;
  background: white;
  border-radius: 20px;
  border: none;
}
</style>
</head>

<body>

<audio id="music" src="music.mp3"></audio>

<div id="loading" class="screen">
  <img src="loading.jpg">
  <div class="loading-text">loading 19.99%</div>
  <button class="button" onclick="openPage()">continue</button>
</div>

<div id="main" class="screen hidden">
  <img src="collage.jpg">
</div>

<script>
function openPage() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");

  const music = document.getElementById("music");
  music.play().catch(() => {});
}
</script>

</body>
</html>
