<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>20</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
}

#screen1, #screen2 {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#screen2 {
  display: none;
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

img {
  max-width: 90%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="screen1">
  <h1>loading… 19.99%</h1>
  <button onclick="start()">upgrade complete → continue</button>
</div>

<div id="screen2">
  <img src="collage.jpg">
  <h2>I’m ready to be twenty</h2>
  <p>20.05 | 15:00</p>
  <a href="https://yourwishlist.com" target="_blank">wishlist</a>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
function start() {
  document.getElementById('music').play();
  document.getElementById('screen1').style.display = 'none';
  document.getElementById('screen2').style.display = 'flex';
}
</script>

</body>
</html>
