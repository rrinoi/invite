<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>jeno's wifey's twenty</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ОБЩИЕ ЭКРАНЫ */
.screen {
  position: fixed;
  width: 100%;
  height: 100vh;
  top: 0;
  left: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: 0.5s;
}

/* ПЕРВАЯ СТРАНИЦА */
#loading {
  background: #ff4fa3;
}

/* ТЕКСТ LOADING */
.loading-text {
  font-size: 48px;
  font-weight: 900;
  color: white;
  text-shadow: 4px 4px 0 black;
  margin-bottom: 30px;
}

/* КНОПКА */
.button {
  padding: 12px 30px;
  border-radius: 25px;
  border: 2px solid black;
  background: #ffc0cb;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.button:hover {
  transform: scale(1.05);
}

/* ВТОРАЯ СТРАНИЦА */
#main {
  background: black;
  opacity: 0;
  pointer-events: none;
}

/* КОЛЛАЖ */
#main img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 🎧 МУЗЫКА -->
<audio id="music" src="music.mp3" loop></audio>

<!-- 💗 LOADING -->
<div id="loading" class="screen">
  <div class="loading-text">loading 19.99%</div>
  <div class="button" onclick="openPage()">upgrade complete → continue</div>
</div>

<!-- 🖼️ КОЛЛАЖ -->
<div id="main" class="screen">
  <img src="collage.jpg">
</div>

<script>
function openPage() {
  document.getElementById("loading").style.opacity = "0";
  document.getElementById("main").style.opacity = "1";
  document.getElementById("main").style.pointerEvents = "auto";

  document.getElementById("music").play();
}
</script>

</body>
</html>
