<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>20</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* ОБЩИЕ ЭКРАНЫ */
.screen {
  position: fixed;
  width: 100%;
  height: 100vh;
  top: 0;
  left: 0;
}

/* ПЕРВАЯ СТРАНИЦА */
#loading {
  background: #ff4fa3;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* КАРТИНКА НА ПЕРВОЙ СТРАНИЦЕ */
#loading img {
  width: 250px;
  margin-bottom: 20px;
}

/* ТЕКСТ */
.loading-text {
  font-size: 40px;
  color: white;
  text-shadow: 3px 3px 0 black;
  margin-bottom: 20px;
}

/* КНОПКА */
.button {
  padding: 10px 25px;
  background: white;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* ВТОРАЯ СТРАНИЦА */
#main {
  background: black;
  display: none;
}

/* КОЛЛАЖ НА ВЕСЬ ЭКРАН */
#main img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 🎧 музыка -->
<audio id="music" src="music.mp3"></audio>

<!-- 💗 экран 1 -->
<div id="loading" class="screen">
  <img src="loading.jpg">
  <div class="loading-text">loading 19.99%</div>
  <button class="button" onclick="openPage()">continue</button>
</div>

<!-- 🖼 экран 2 -->
<div id="main" class="screen">
  <img src="collage.jpg">
</div>

<script>
function openPage() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("music").play();
}
</script>

</body>
</html>
